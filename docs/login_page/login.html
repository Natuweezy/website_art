<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Khaya — Login</title>
<!-- Fonts -->
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./login_styles.css" />
</head>
<body data-theme="light">
<header class="page-header" role="banner">
  <div class="header-inner">
    <a class="brand" href="../index.html" aria-label="Khaya home">
      <img src="../logos/KH gold.png" alt="Khaya" width="200" height="44" loading="eager" />
    </a>
    <nav aria-label="Site navigation">
      <button class="btn btn-icon" id="theme-toggle" type="button" aria-label="Switch to dark mode" title="Toggle theme">
        <span id="theme-icon" aria-hidden="true">☀</span>
      </button>
    </nav>
  </div>
</header>
<main class="login-page" aria-label="Login">
<div class="login-card" role="form" aria-labelledby="khayaTitle">
<img src="../logos/KH gold.png" alt="Khaya logo" class="login-logo" width="320" height="100" />

<form id="loginForm" novalidate>
<label class="sr-only" for="loginEmail">Email</label>
<input type="email" id="loginEmail" placeholder="Email" autocomplete="username" required />

<label class="sr-only" for="loginPassword">Password</label>
<input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password" required />

<button id="loginBtn" type="submit">Login</button>
<p id="login-error" role="alert" aria-live="polite"></p>
</form>
</div>
</main>

<script defer src="./login.js"></script>
</body>
</html>
