<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sign in — Art Platform Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<style>
  :root {
    --gap:12px;
    --bg:#070708;
    --panel:#111214;
    --ink:#f2c34a;
    --muted:#c99b33;
    --line:#151518;
  }
  body[data-theme="light"]{
    --bg:#f7f6f2;
    --panel:#ffffff;
    --ink:#1c1d22;
    --muted:#4f5058;
    --line:#d9d5c8;
  }
  /* Center the card in the middle of the screen */
  body {
    font-family: "Inter", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: var(--bg);
    color: var(--ink);
    padding: 16px;
  }
  .card {
    width: 100%;
    max-width: 420px;
    border:1px solid var(--line);
    border-radius:16px;
    padding:24px;
    box-shadow: 0 14px 36px rgba(0,0,0,.45);
    background: var(--panel);
  }
  h1 { margin:0 0 8px; color: var(--ink); }
  p.muted { color:var(--muted); margin-top:0; }
  form { display:grid; gap: var(--gap); margin-top: 12px;}
  input, button {
    padding:12px;
    font-size:14px;
    background:#0b0c0e;
    border:1px solid var(--line);
    color: var(--ink);
  }
  button { cursor:pointer; transition: filter .15s ease, transform .05s ease; }
  button:hover { filter: brightness(1.08); }
  button:active { transform: translateY(1px); }
  .muted { color:var(--muted); font-size:12px; }
  .success { color:var(--ink); }
  .error { color:#b80606; }
  .theme-btn {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 38px;
    height: 38px;
    display: grid;
    place-items: center;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--ink);
    cursor: pointer;
    transition: background .2s ease, color .2s ease, border-color .2s ease, transform .05s ease;
  }
  .theme-btn:hover { background: rgba(0,0,0,.05); }
  .theme-btn:active { transform: translateY(1px); }
</style>
</head>
<body>
<button
  class="theme-btn"
  type="button"
  data-theme-toggle
  aria-label="Toggle theme"
  title="Toggle theme"
>☀</button>
<script>
  const API_BASE = "/.netlify/functions";

  // If already signed in, only redirect if they're an admin
  (async () => {
    const res = await fetch(`${API_BASE}/auth-session`);
    const data = await res.json().catch(() => ({}));
    if (data?.user) {
      if (data.is_admin) {
        location.href = 'index.html';
      } else {
        await fetch(`${API_BASE}/auth-logout`, { method: "POST" });
        const msg = document.getElementById('msg');
        if (msg) { msg.textContent = 'Access restricted: admin account required.'; msg.className = 'error'; }
      }
    }
  })();
</script>

<div class="card">
  <h1>Admin Sign in</h1>
  <p class="muted">Email + password only. No sign up here.</p>

  <form id="loginForm" novalidate>
    <input id="email" type="email" placeholder="you@example.com" autocomplete="username" required />
    <input id="password" type="password" placeholder="Password" autocomplete="current-password" required />
    <button id="submitBtn" type="submit">Sign in</button>
    <span id="msg" class="muted" aria-live="polite"></span>
  </form>
</div>

<script>
  const form = document.getElementById('loginForm');
  const msg  = document.getElementById('msg');
  const btn  = document.getElementById('submitBtn');

  function setStatus(text, cls='muted'){ msg.textContent = text; msg.className = cls; }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    try {
      btn.disabled = true;
      setStatus('Signing in…');

      const res = await fetch(`${API_BASE}/auth-login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || "Login failed.");

      if (!data.is_admin) {
        await fetch(`${API_BASE}/auth-logout`, { method: "POST" });
        setStatus('Access restricted: admin account required.', 'error');
        btn.disabled = false;
        return;
      }

      // Admin OK
      setStatus('Signed in ✔ Redirecting…', 'success');
      location.href = 'index.html';
    } catch (err) {
      setStatus(err?.message || 'Something went wrong.', 'error');
      btn.disabled = false;
    }
  });
</script>
<script defer src="../theme-toggle.js"></script>
</body>
</html>
